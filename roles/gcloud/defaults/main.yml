---
# Default variables for the gcloud role.

# macOS: Google Cloud SDK Homebrew cask.
gcloud_brew_cask: "google-cloud-sdk"

# Linux: install a pinned Google Cloud CLI from the official tarball.
# Release notes / versions: https://cloud.google.com/sdk/docs/release-notes
# Tracked via the google/cloud-sdk image tags, which mirror CLI versions.
# renovate: datasource=docker depName=google/cloud-sdk
gcloud_version: "573.0.0"

# Where the SDK is installed. The tarball contains a top-level
# "google-cloud-sdk/" directory, so it is extracted into this path's parent.
gcloud_install_dir: "/opt/google-cloud-sdk"

# Force a reinstall even when the pinned version is already present.
gcloud_force: false

# Download details (official dl.google.com tarball). The ARM64 build uses the
# "arm" suffix; everything else uses "x86_64".
gcloud_arch: "{{ 'arm' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x86_64' }}"
gcloud_download_url: "https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-{{ gcloud_version }}-linux-{{ gcloud_arch }}.tar.gz"
