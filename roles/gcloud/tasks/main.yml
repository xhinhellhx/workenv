---
# Install the Google Cloud CLI (gcloud).
#   - macOS: Homebrew cask (Homebrew ensured by the `homebrew` role dependency)
#   - Debian/Ubuntu: official apt repo
#   - RHEL family: official yum repo

- name: Install Google Cloud SDK (macOS, Homebrew cask)
  community.general.homebrew_cask:
    name: "{{ gcloud_brew_cask }}"
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_facts['system'] == "Darwin"

- name: Install Google Cloud CLI (Debian/Ubuntu)
  when: ansible_facts['os_family'] == "Debian"
  become: true
  block:
    - name: Install apt prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - curl
          - python3-debian
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure the apt keyrings directory exists
      ansible.builtin.file:
        path: "{{ gcloud_apt_keyring_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Add the Google Cloud apt signing key (dearmored)
      # The upstream key is ASCII-armored; deb822 Signed-By needs a binary
      # keyring, so dearmor it locally instead of pointing signed_by at the URL.
      ansible.builtin.get_url:
        url: "{{ gcloud_apt_key_url }}"
        dest: /etc/apt/keyrings/cloud.google.asc
        mode: "0644"

    - name: Dearmor the Google Cloud apt signing key
      ansible.builtin.command:
        cmd: "gpg --batch --yes --dearmor -o {{ gcloud_apt_keyring_path }} /etc/apt/keyrings/cloud.google.asc"
      args:
        creates: "{{ gcloud_apt_keyring_path }}"

    - name: Add the Google Cloud apt repository (deb822)
      ansible.builtin.deb822_repository:
        name: google-cloud-sdk
        types: [deb]
        uris: "{{ gcloud_apt_repo }}"
        suites: [cloud-sdk]
        components: [main]
        signed_by: "{{ gcloud_apt_keyring_path }}"
        state: present

    - name: Install the google-cloud-cli package
      ansible.builtin.apt:
        name: "{{ gcloud_package }}"
        state: present
        update_cache: true

- name: Install Google Cloud CLI (RHEL family)
  when: ansible_facts['os_family'] == "RedHat"
  become: true
  block:
    - name: Add the Google Cloud yum repository
      ansible.builtin.yum_repository:
        name: google-cloud-cli
        description: Google Cloud CLI
        baseurl: "{{ gcloud_yum_baseurl }}"
        enabled: true
        gpgcheck: true
        repo_gpgcheck: false
        gpgkey: "{{ gcloud_yum_gpgkey }}"

    - name: Install the google-cloud-cli package
      ansible.builtin.dnf:
        name: "{{ gcloud_package }}"
        state: present
