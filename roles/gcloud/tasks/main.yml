---
# Install the Google Cloud CLI (gcloud).
#   - macOS: Homebrew cask (Homebrew ensured by the `homebrew` role dependency)
#   - Linux: official versioned tarball from dl.google.com -> /opt
#
# The tarball is used instead of the apt/yum repositories: it is a single code
# path for every distro and architecture, needs no GPG keyring or repo setup,
# and (unlike the distro packages) leaves `gcloud components update` enabled.

- name: Install Google Cloud SDK (macOS, Homebrew cask)
  community.general.homebrew_cask:
    name: "{{ gcloud_brew_cask }}"
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_facts['system'] == "Darwin"

- name: Install Google Cloud CLI (Linux)
  when: ansible_facts['system'] == "Linux"
  block:
    - name: Check installed gcloud version
      ansible.builtin.command: "{{ gcloud_install_dir }}/bin/gcloud version"
      register: gcloud_installed
      changed_when: false
      failed_when: false

    - name: Determine whether a gcloud (re)install is required
      ansible.builtin.set_fact:
        gcloud_install_required: "{{ gcloud_force or ('Google Cloud SDK ' ~ gcloud_version) not in gcloud_installed.stdout }}"

    - name: Install gcloud from the official tarball, version {{ gcloud_version }}
      when: gcloud_install_required
      become: true
      block:
        - name: Remove any existing gcloud installation
          # The tarball is self-contained, so a clean directory guarantees no
          # stale components survive an upgrade. PATH/completion live in
          # /etc/profile.d (below) and are unaffected.
          ansible.builtin.file:
            path: "{{ gcloud_install_dir }}"
            state: absent

        - name: Download and extract gcloud {{ gcloud_version }}
          ansible.builtin.unarchive:
            src: "{{ gcloud_download_url }}"
            dest: "{{ gcloud_install_dir | dirname }}"
            remote_src: true
            creates: "{{ gcloud_install_dir }}/bin/gcloud"

    - name: Add gcloud to PATH and enable completion (system-wide)
      ansible.builtin.copy:
        dest: /etc/profile.d/gcloud.sh
        content: |
          export PATH="$PATH:{{ gcloud_install_dir }}/bin"
          if [ -n "${BASH_VERSION:-}" ] && [ -f "{{ gcloud_install_dir }}/completion.bash.inc" ]; then
            . "{{ gcloud_install_dir }}/completion.bash.inc"
          elif [ -n "${ZSH_VERSION:-}" ] && [ -f "{{ gcloud_install_dir }}/completion.zsh.inc" ]; then
            . "{{ gcloud_install_dir }}/completion.zsh.inc"
          fi
        mode: "0644"
      become: true
