---
# Install goreleaser.
#   - macOS: Homebrew (Homebrew ensured by the `homebrew` role dependency)
#   - Linux: official GitHub release tarball -> /usr/local/bin

- name: Install goreleaser (macOS, Homebrew)
  community.general.homebrew:
    name: goreleaser
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_facts['system'] == "Darwin"

- name: Install goreleaser (Linux)
  when: ansible_facts['system'] == "Linux"
  block:
    - name: Check installed goreleaser version
      ansible.builtin.command: "{{ goreleaser_install_dir }}/goreleaser --version"
      register: goreleaser_installed
      changed_when: false
      failed_when: false

    - name: Install goreleaser from the release tarball, version {{ goreleaser_version }}
      when: goreleaser_version not in goreleaser_installed.stdout
      block:
        - name: Create a temporary directory for the goreleaser download
          ansible.builtin.tempfile:
            state: directory
            suffix: goreleaser
          register: goreleaser_tmp

        - name: Download and extract goreleaser {{ goreleaser_version }}
          ansible.builtin.unarchive:
            src: "{{ goreleaser_download_url }}"
            dest: "{{ goreleaser_tmp.path }}"
            remote_src: true

        - name: Install the goreleaser binary
          ansible.builtin.shell: |
            set -eu
            bin="$(find '{{ goreleaser_tmp.path }}' -type f -name goreleaser -print -quit)"
            install -m 0755 "$bin" '{{ goreleaser_install_dir }}/goreleaser'
          become: true
          changed_when: true

        - name: Remove the temporary directory
          ansible.builtin.file:
            path: "{{ goreleaser_tmp.path }}"
            state: absent
