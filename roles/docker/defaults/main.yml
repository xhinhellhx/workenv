---
# Default variables for the docker role.

# macOS: install the Docker CLI and the Colima runtime as Homebrew *formulae*
# (no Docker Desktop). Casks install a .app and require an authentication
# prompt that breaks the non-interactive playbook; formulae do not.
docker_brew_formulae:
  - docker
  - docker-compose
  - docker-buildx
  - colima

# macOS: directory registered in ~/.docker/config.json's cliPluginsExtraDirs so
# the docker CLI discovers Homebrew-installed plugins (`docker compose`,
# `docker buildx`, ...). Every Homebrew docker plugin formula drops its binary
# here. On Linux the get.docker.com script installs the equivalent *-plugin
# packages system-wide, so this is macOS-only.
# homebrew_prefix comes from the homebrew role, a macOS-only dependency, so it is
# undefined when this default is templated outside a macOS run (e.g. ansible-lint
# static analysis). Fall back to Homebrew's own non-arm64 default so the value is
# always resolvable; on a real macOS run the dependency supplies the real prefix.
docker_cli_plugins_dir: "{{ homebrew_prefix | default('/usr/local') }}/lib/docker/cli-plugins"

# Linux: users added to the `docker` group (to run docker without sudo).
docker_users:
  - "{{ ansible_facts['user_id'] }}"

# Linux installer (official convenience script; detects the distro).
docker_install_url: "https://get.docker.com"
