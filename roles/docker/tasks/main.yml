---
# Install Docker.
#   - macOS: Docker CLI + Colima runtime via Homebrew formulae (no Docker
#     Desktop — casks need an auth prompt that breaks the non-interactive run).
#   - Linux: official convenience script, then enable the daemon and grant
#     group access (Debian/Ubuntu and RHEL family).

- name: Install and auto-start Docker via Colima (macOS, no Docker Desktop)
  when: ansible_facts['system'] == "Darwin"
  block:
    - name: Install the Docker CLI and Colima runtime (Homebrew formulae)
      community.general.homebrew:
        name: "{{ docker_brew_formulae }}"
        state: present
        path: "{{ homebrew_prefix }}/bin"

    # Homebrew installs the Docker CLI plugins (compose, buildx) into
    # {{ docker_cli_plugins_dir }} as standalone formulae. Register that
    # directory in ~/.docker/config.json's cliPluginsExtraDirs so the docker CLI
    # discovers them (`docker compose`, `docker buildx`). This is the layout
    # Homebrew's caveats recommend and auto-picks-up every Homebrew docker plugin
    # without enumerating them.
    - name: Ensure the Docker config directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts['env'].HOME }}/.docker"
        state: directory
        mode: "0755"

    - name: Read the existing Docker config.json (if present)
      ansible.builtin.slurp:
        src: "{{ ansible_facts['env'].HOME }}/.docker/config.json"
      register: docker_config_raw
      failed_when: false

    - name: Parse the existing Docker config.json (default to empty)
      ansible.builtin.set_fact:
        docker_config_current: >-
          {{ (docker_config_raw.content | b64decode | from_json)
             if docker_config_raw.content is defined else {} }}

    # Merge our plugins dir into cliPluginsExtraDirs, preserving every other key
    # (auths, credsStore, currentContext, ...) and any dirs already listed.
    - name: Register the Homebrew CLI plugins dir in ~/.docker/config.json
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env'].HOME }}/.docker/config.json"
        mode: "0600"
        content: >-
          {{ docker_config_current | combine({
               'cliPluginsExtraDirs':
                 (docker_config_current.cliPluginsExtraDirs | default([]) + [docker_cli_plugins_dir | default('')]) | unique
             }) | to_nice_json }}

    - name: Ensure the user LaunchAgents directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts['env'].HOME }}/Library/LaunchAgents"
        state: directory
        mode: "0755"

    # Remove the old Docker Desktop autostart agent if a previous run created it.
    - name: Remove the legacy Docker Desktop autostart agent
      ansible.builtin.file:
        path: "{{ ansible_facts['env'].HOME }}/Library/LaunchAgents/com.workenv.docker-autostart.plist"
        state: absent

    - name: Start the Colima VM at login (LaunchAgent)
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env'].HOME }}/Library/LaunchAgents/com.workenv.colima-autostart.plist"
        mode: "0644"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key>
              <string>com.workenv.colima-autostart</string>
              <key>ProgramArguments</key>
              <array>
                  <string>{{ homebrew_prefix }}/bin/colima</string>
                  <string>start</string>
              </array>
              <key>EnvironmentVariables</key>
              <dict>
                  <key>PATH</key>
                  <string>{{ homebrew_prefix }}/bin:/usr/bin:/bin:/usr/sbin:/sbin</string>
              </dict>
              <key>RunAtLoad</key>
              <true/>
          </dict>
          </plist>

    - name: Check whether the Colima VM is already running
      ansible.builtin.command: "{{ homebrew_prefix }}/bin/colima status"
      register: colima_status
      changed_when: false
      failed_when: false

    - name: Start the Colima VM now
      ansible.builtin.command: "{{ homebrew_prefix }}/bin/colima start"
      when: colima_status.rc != 0
      changed_when: true

- name: Install Docker (Linux)
  when: ansible_facts['system'] == "Linux"
  block:
    - name: Check whether Docker is installed
      ansible.builtin.command: docker --version
      register: docker_installed
      changed_when: false
      failed_when: false

    - name: Download Docker install script
      ansible.builtin.get_url:
        url: "{{ docker_install_url }}"
        dest: /tmp/get-docker.sh
        mode: "0755"
      when: docker_installed.rc != 0

    - name: Run Docker install script
      ansible.builtin.command: /bin/sh /tmp/get-docker.sh
      become: true
      when: docker_installed.rc != 0
      changed_when: true

    - name: Remove Docker install script
      ansible.builtin.file:
        path: /tmp/get-docker.sh
        state: absent

    - name: Enable and start the Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      become: true

    - name: Add users to the docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      become: true
      loop: "{{ docker_users }}"
