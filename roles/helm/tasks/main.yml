---
# Install Helm.
#   - macOS: Homebrew (Homebrew ensured by the `homebrew` role dependency)
#   - Linux: official release tarball (https://get.helm.sh) -> /usr/local/bin

- name: Install Helm (macOS, Homebrew)
  community.general.homebrew:
    name: helm
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_facts['system'] == "Darwin"

- name: Install Helm (Linux)
  when: ansible_facts['system'] == "Linux"
  block:
    - name: Check installed Helm version
      ansible.builtin.command: "{{ helm_install_dir }}/helm version --short"
      register: helm_installed
      changed_when: false
      failed_when: false

    - name: Install Helm from the release tarball, version {{ helm_version }}
      when: helm_force or helm_version not in helm_installed.stdout
      block:
        - name: Create a temporary directory for the Helm download
          ansible.builtin.tempfile:
            state: directory
            suffix: helm
          register: helm_tmp

        - name: Download and extract Helm {{ helm_version }}
          ansible.builtin.unarchive:
            src: "{{ helm_download_url }}"
            dest: "{{ helm_tmp.path }}"
            remote_src: true

        - name: Install the helm binary
          ansible.builtin.shell: |
            set -eu
            bin="$(find '{{ helm_tmp.path }}' -type f -name helm -print -quit)"
            install -m 0755 "$bin" '{{ helm_install_dir }}/helm'
          become: true
          changed_when: true

        - name: Remove the temporary directory
          ansible.builtin.file:
            path: "{{ helm_tmp.path }}"
            state: absent
