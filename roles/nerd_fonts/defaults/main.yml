---
# Default variables for the nerd_fonts role.

nerd_fonts_repo: "https://github.com/ryanoasis/nerd-fonts"
# Tag to clone (depth=1, single branch).
nerd_fonts_version: "v3.4.0"
# Where the repo is cloned.
nerd_fonts_clone_dir: "{{ ansible_facts['env'].HOME }}/.cache/nerd-fonts"

# Fonts to install (passed to install.sh). These are patched-font directory
# names; SourceCodePro yields the "SauceCodePro Nerd Font" family.
# Leave empty to install ALL fonts (very large download + install).
nerd_fonts_list:
  - FiraCode
  - JetBrainsMono
  - Hack
  - Meslo
  - SourceCodePro

# Re-clone and re-install even if the marker for this version exists.
nerd_fonts_force: false
# Marker file used to make the role idempotent per version.
nerd_fonts_state_file: "{{ ansible_facts['env'].HOME }}/.cache/nerd-fonts-{{ nerd_fonts_version }}.installed"
