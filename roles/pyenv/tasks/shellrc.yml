---
# Deliver pyenv shell init as a zsh rc.d fragment (sourced after oh-my-zsh).

- name: Ensure the zsh rc.d directory exists
  ansible.builtin.file:
    path: "{{ zsh_fragment_dir }}/rc.d"
    state: directory
    mode: "0755"

- name: Configure pyenv in the shell (rc.d fragment)
  ansible.builtin.copy:
    dest: "{{ zsh_fragment_dir }}/rc.d/20-pyenv.zsh"
    mode: "0644"
    content: |
      export PYENV_ROOT="{{ pyenv_root }}"
      [ -d "$PYENV_ROOT/bin" ] && export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init - zsh)"
