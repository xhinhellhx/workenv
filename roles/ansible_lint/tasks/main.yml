---
# Install ansible-lint (a linter for Ansible playbooks and roles).
#   - macOS: Homebrew (Homebrew ensured by the `homebrew` role dependency)
#   - Linux: pipx (isolated, latest version) on Debian/Ubuntu and RHEL family

- name: Install ansible-lint (macOS, Homebrew)
  community.general.homebrew:
    name: ansible-lint
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_facts['system'] == "Darwin"

- name: Install ansible-lint (Linux)
  when: ansible_facts['system'] == "Linux"
  block:
    - name: Install pipx (Debian/Ubuntu)
      ansible.builtin.apt:
        name: pipx
        state: present
        update_cache: true
        cache_valid_time: 3600
      become: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Enable EPEL repository (RHEL family, excluding Fedora)
      ansible.builtin.dnf:
        name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
        state: present
        disable_gpg_check: true
      become: true
      when:
        - ansible_facts['os_family'] == "RedHat"
        - ansible_facts['distribution'] != "Fedora"

    - name: Install pipx (RHEL family)
      ansible.builtin.dnf:
        name: pipx
        state: present
      become: true
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install ansible-lint with pipx
      community.general.pipx:
        name: ansible-lint
        state: present
        executable: /usr/bin/pipx
