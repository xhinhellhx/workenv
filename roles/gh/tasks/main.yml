---
# Install gh (GitHub CLI) from the official release archive.
#   - macOS: release zip -> gh_install_dir
#   - Linux: release tarball -> gh_install_dir (Debian/Ubuntu, RHEL)

- name: Check installed gh version
  ansible.builtin.command: "{{ gh_install_dir }}/gh --version"
  register: gh_installed
  changed_when: false
  failed_when: false

- name: Install gh from the official release archive, version {{ gh_version }}
  when: gh_version not in gh_installed.stdout
  block:
    - name: Create a temporary directory for the gh download
      ansible.builtin.tempfile:
        state: directory
        suffix: gh
      register: gh_tmp

    - name: Download and extract the gh release archive (macOS)
      ansible.builtin.unarchive:
        src: "{{ gh_macos_download_url }}"
        dest: "{{ gh_tmp.path }}"
        remote_src: true
      when: ansible_facts['system'] == "Darwin"

    - name: Download and extract the gh release archive (Linux)
      ansible.builtin.unarchive:
        src: "{{ gh_linux_download_url }}"
        dest: "{{ gh_tmp.path }}"
        remote_src: true
      when: ansible_facts['system'] == "Linux"

    - name: Install the gh binary
      ansible.builtin.shell: |
        set -eu
        bin="$(find '{{ gh_tmp.path }}' -type f -name gh -print -quit)"
        install -m 0755 "$bin" '{{ gh_install_dir }}/gh'
      become: true
      changed_when: true

    - name: Remove the temporary directory
      ansible.builtin.file:
        path: "{{ gh_tmp.path }}"
        state: absent
