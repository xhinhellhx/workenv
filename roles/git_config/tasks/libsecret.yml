---
# Ensure the git-credential-libsecret helper is available on Linux.
#   - Debian/Ubuntu: git ships it as source under contrib; build and install it.
#   - RHEL family: provided by the git-credential-libsecret package.

- name: Provide git-credential-libsecret (Debian/Ubuntu)
  when: ansible_facts['os_family'] == "Debian"
  become: true
  block:
    - name: Install libsecret build dependencies
      ansible.builtin.apt:
        name:
          - libsecret-1-0
          - libsecret-1-dev
          - make
          - gcc
          - pkg-config
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Build git-credential-libsecret from git contrib
      ansible.builtin.command:
        cmd: "make -C {{ git_libsecret_contrib_dir }}"
        creates: "{{ git_libsecret_contrib_dir }}/git-credential-libsecret"

    - name: Install git-credential-libsecret into PATH
      ansible.builtin.copy:
        src: "{{ git_libsecret_contrib_dir }}/git-credential-libsecret"
        dest: /usr/local/bin/git-credential-libsecret
        remote_src: true
        mode: "0755"

- name: Install git-credential-libsecret (RHEL family)
  ansible.builtin.dnf:
    name: git-credential-libsecret
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"
