---
# Install shfmt (shell formatter).
#   - macOS: Homebrew (Homebrew ensured by the `homebrew` role dependency)
#   - Linux: official release binary -> /usr/local/bin

- name: Install shfmt (macOS, Homebrew)
  community.general.homebrew:
    name: shfmt
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_system == "Darwin"

- name: Install shfmt (Linux)
  when: ansible_system == "Linux"
  block:
    - name: Check installed shfmt version
      ansible.builtin.command: "{{ shfmt_install_dir }}/shfmt --version"
      register: shfmt_installed
      changed_when: false
      failed_when: false

    - name: Download the shfmt binary, version {{ shfmt_version }}
      ansible.builtin.get_url:
        url: "{{ shfmt_download_url }}"
        dest: "{{ shfmt_install_dir }}/shfmt"
        mode: "0755"
      become: true
      when: ('v' ~ shfmt_version) not in shfmt_installed.stdout
