---
# Install Claude Code.
#   - macOS: official install script
#   - Linux: official install script (Debian/Ubuntu and RHEL family)

- name: Install Claude Code on macOS (install script)
  ansible.builtin.import_tasks: install-macos.yml
  when: ansible_facts['system'] == "Darwin"

- name: Install Claude Code on Linux (install script)
  ansible.builtin.import_tasks: install-linux.yml
  when: ansible_facts['system'] == "Linux"
