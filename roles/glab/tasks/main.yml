---
# Install glab (GitLab CLI).
#   - macOS: Homebrew (Homebrew ensured by the `homebrew` role dependency)
#   - Linux: official release tarball -> /usr/local/bin (Debian/Ubuntu, RHEL)

- name: Install glab (macOS, Homebrew)
  community.general.homebrew:
    name: glab
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_system == "Darwin"

- name: Install glab (Linux)
  when: ansible_system == "Linux"
  block:
    - name: Check installed glab version
      ansible.builtin.command: "{{ glab_install_dir }}/glab --version"
      register: glab_installed
      changed_when: false
      failed_when: false

    - name: Install glab {{ glab_version }} from the release tarball
      when: glab_version not in glab_installed.stdout
      block:
        - name: Create a temporary directory for the glab download
          ansible.builtin.tempfile:
            state: directory
            suffix: glab
          register: glab_tmp

        - name: Download and extract glab {{ glab_version }}
          ansible.builtin.unarchive:
            src: "{{ glab_download_url }}"
            dest: "{{ glab_tmp.path }}"
            remote_src: true

        - name: Install the glab binary
          ansible.builtin.shell: |
            set -eu
            bin="$(find '{{ glab_tmp.path }}' -type f -name glab | head -n1)"
            install -m 0755 "$bin" '{{ glab_install_dir }}/glab'
          become: true
          changed_when: true

        - name: Remove the temporary directory
          ansible.builtin.file:
            path: "{{ glab_tmp.path }}"
            state: absent
