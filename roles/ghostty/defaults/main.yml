---
# Default variables for the ghostty role.

# --- Configuration ------------------------------------------------------------
# Ghostty reads its config from $XDG_CONFIG_HOME/ghostty/config on both
# macOS and Linux.
ghostty_config_dir: "{{ xdg_config_home | default(ansible_facts['env'].HOME ~ '/.config') }}/ghostty"

# --- macOS (Homebrew) ---------------------------------------------------------
# Ghostty is distributed as a Homebrew cask.
ghostty_brew_cask: "ghostty"

# --- Linux (Snap) -------------------------------------------------------------
# Ghostty is installed on Linux from the Snap Store on both Debian/Ubuntu and
# the RHEL family. The snap is published by Canonical and uses classic
# confinement (terminal emulators need host access), so it is installed with
# `--classic`. It bundles its own GTK4/libadwaita, avoiding the system-GTK
# version skew that breaks a source build on enterprise distros (e.g. RHEL's
# GTK4 is too old, producing theme-parser and GDK "color-mgmt" errors).
# Ghostty is not on Flathub, so flatpak is not used.
ghostty_snap_name: "ghostty"
# Stable launcher path placed on PATH. snap already exposes /snap/bin/ghostty;
# this symlink guarantees `ghostty` resolves even when /snap/bin is missing from
# the current session's PATH.
ghostty_bin: "/usr/local/bin/ghostty"
