---
# Default variables for the ghostty role.

# --- Configuration ------------------------------------------------------------
# Ghostty reads its config from $XDG_CONFIG_HOME/ghostty/config on both
# macOS and Linux.
ghostty_config_dir: "{{ xdg_config_home | default(ansible_facts['env'].HOME ~ '/.config') }}/ghostty"

# --- macOS (Homebrew) ---------------------------------------------------------
# Ghostty is distributed as a Homebrew cask.
ghostty_brew_cask: "ghostty"

# --- Linux (Snap) -------------------------------------------------------------
# Ghostty is installed on Linux from the Snap Store on both Debian/Ubuntu and
# the RHEL family. The snap is published by Canonical and uses classic
# confinement (terminal emulators need host access), so it is installed with
# `--classic`. It bundles its own GTK4/libadwaita, avoiding the system-GTK
# version skew that breaks a source build on enterprise distros (e.g. RHEL's
# GTK4 is too old, producing theme-parser and GDK "color-mgmt" errors).
# Ghostty is not on Flathub, so flatpak is not used.
ghostty_snap_name: "ghostty"
# Stable launcher path placed on PATH. snap already exposes /snap/bin/ghostty;
# this symlink guarantees `ghostty` resolves even when /snap/bin is missing from
# the current session's PATH.
ghostty_bin: "/usr/local/bin/ghostty"

# Ghostty renders with OpenGL and refuses to start unless it can get an OpenGL
# 4.3 context. Virtual GPUs (VirtualBox VMSVGA, VMware SVGA3D, QEMU/virgl,
# Parallels, many cloud instances) cap the hardware GL path well below 4.3, so
# Ghostty fails with "OpenGL version is too old". Mesa's llvmpipe software
# rasterizer exposes OpenGL 4.5, satisfying the requirement, and is selected by
# setting LIBGL_ALWAYS_SOFTWARE=1. We enable that automatically inside VM guests
# (where there is no hardware acceleration to lose anyway) and leave bare-metal
# hosts on their real GPU driver.
#
# Left as "auto" (the default) the role detects a VM guest at runtime — see
# install-linux.yml. Detection does not trust Ansible's virtualization_role fact
# alone: it misses some hypervisors and on Fedora guests often comes back
# 'NA'/'host', which silently disabled this workaround (so Ghostty would not
# start from the GNOME dock). It falls back to systemd-detect-virt, which is
# authoritative on systemd distros. Set to true or false to force the choice and
# skip detection.
ghostty_force_software_opengl: "auto"
