---
# Install Ghostty on Linux from the Snap Store (Debian/Ubuntu and RHEL family).
# The ghostty snap (published by Canonical) uses classic confinement and bundles
# its own GTK4/libadwaita, so it runs cleanly even where the system GTK is too
# old to build Ghostty from source (e.g. RHEL). snapd also registers the desktop
# entry and icons itself, so no manual desktop integration is required.
# (Ghostty is not published on Flathub, so flatpak is not used here.)

- name: Fail on unsupported Linux distribution
  ansible.builtin.fail:
    msg: >-
      Unsupported OS family '{{ ansible_facts['os_family'] }}'. The ghostty role
      installs the snap only on Debian/Ubuntu and RHEL-family systems.
  when: ansible_facts['os_family'] not in ["Debian", "RedHat"]

# --- snapd bootstrap (Debian/Ubuntu) -----------------------------------------
- name: Install snapd (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ ghostty_snapd_package }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

# --- snapd bootstrap (RHEL family) -------------------------------------------
# snapd lives in EPEL on the RHEL family, so enable EPEL first. Classic snaps
# also require /snap to exist; on RHEL snapd stores snaps under
# /var/lib/snapd/snap, so the /snap symlink has to be created by hand (without
# it, `snap install --classic` refuses to run).
- name: Enable EPEL (RHEL family)
  ansible.builtin.dnf:
    name: "{{ ghostty_epel_package }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == "RedHat"
    - ansible_facts['distribution'] != "Fedora"

- name: Install snapd (RHEL family)
  ansible.builtin.dnf:
    name: "{{ ghostty_snapd_package }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

- name: Create the /snap symlink required by classic snaps (RHEL family)
  ansible.builtin.file:
    src: /var/lib/snapd/snap
    dest: /snap
    state: link
  become: true
  when: ansible_facts['os_family'] == "RedHat"

# --- Enable snapd and wait for seeding (all families) -------------------------
- name: Enable and start the snapd socket
  ansible.builtin.systemd:
    name: snapd.socket
    state: started
    enabled: true
  become: true

# A freshly installed snapd must finish seeding before it accepts installs.
# `snap wait system seed.loaded` blocks until seeding completes and returns
# immediately once seeded, so it is safe (and idempotent) to run every time.
- name: Wait for snapd to finish seeding
  ansible.builtin.command:
    cmd: snap wait system seed.loaded
  become: true
  changed_when: false

# --- OpenGL (Mesa) drivers ----------------------------------------------------
# Ghostty renders with OpenGL and needs an OpenGL 4.3 context. Install libGL and
# the Mesa DRI drivers; these also provide the llvmpipe software rasterizer used
# as the GL 4.3 fallback on VMs (see the LIBGL_ALWAYS_SOFTWARE task below).
- name: Install OpenGL (Mesa) drivers required by Ghostty (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ ghostty_opengl_packages['Debian'] }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install OpenGL (Mesa) drivers required by Ghostty (RHEL family)
  ansible.builtin.dnf:
    name: "{{ ghostty_opengl_packages['RedHat'] }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

# --- Decide whether to force software OpenGL (llvmpipe) -----------------------
# When ghostty_force_software_opengl is left at "auto", work out whether this is
# a VM guest (whose virtual GPU likely caps hardware GL below the 4.3 Ghostty
# needs). Ansible's virtualization_role fact is not reliable enough on its own —
# it misses some hypervisors and on Fedora guests frequently reports 'NA'/'host'
# — so fall back to systemd-detect-virt, the authoritative probe on systemd
# distros. `--vm --quiet` exits 0 inside a VM (excluding containers) and prints
# nothing, so we only need its return code.
- name: Detect virtualization with systemd-detect-virt (auto mode)
  ansible.builtin.command:
    cmd: systemd-detect-virt --vm --quiet
  register: ghostty_detect_virt
  changed_when: false
  failed_when: false
  check_mode: false
  when: ghostty_force_software_opengl == "auto"

- name: Resolve whether to force software OpenGL for Ghostty
  ansible.builtin.set_fact:
    ghostty_force_software_opengl: >-
      {{
        (ansible_facts['virtualization_role'] | default('NA') == 'guest')
        or (ghostty_detect_virt.rc | default(1) == 0)
        if ghostty_force_software_opengl == "auto"
        else (ghostty_force_software_opengl | bool)
      }}

# --- Install Ghostty ----------------------------------------------------------
- name: Install the Ghostty snap (classic confinement)
  community.general.snap:
    name: "{{ ghostty_snap_name }}"
    classic: true
    state: present
  become: true

# --- Desktop integration: XDG_DATA_DIRS for snap apps (RHEL family) -----------
# snapd installs every snap's .desktop entry under /var/lib/snapd/desktop, which
# must be on XDG_DATA_DIRS for the entry to show in GNOME and resolve via
# gtk-launch. snapd only adds it through /etc/profile.d/snapd.sh, which login
# shells source but the GNOME/Wayland session under GDM does not, so on the RHEL
# family (which lacks Ubuntu's snapd session integration) Ghostty is missing from
# the app grid and `gtk-launch ghostty_ghostty` fails with "no such application".
# Inject it into the systemd --user environment instead, which both Wayland and X
# sessions inherit. A generator (rather than a static environment.d drop-in) lets
# us append only when missing and preserve any existing XDG_DATA_DIRS, e.g.
# Flatpak's exports, instead of clobbering it. Takes effect on the next login.
- name: Ensure the systemd user-environment-generators directory exists (RHEL family)
  ansible.builtin.file:
    path: "{{ ghostty_user_env_generator | dirname }}"
    state: directory
    mode: "0755"
  become: true
  when: ansible_facts['os_family'] == "RedHat"

- name: Add snapd's desktop dir to XDG_DATA_DIRS for the user session (RHEL family)
  ansible.builtin.copy:
    dest: "{{ ghostty_user_env_generator }}"
    mode: "0755"
    content: |
      #!/bin/sh
      # Managed by the workenv ghostty role.
      # Ensure snapd's desktop directory is on XDG_DATA_DIRS so snap .desktop
      # entries (e.g. Ghostty) appear in GNOME and resolve via gtk-launch.
      base="${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"
      case ":${base}:" in
        *:{{ ghostty_snap_desktop_dir }}:*) ;;
        *) base="${base}:{{ ghostty_snap_desktop_dir }}" ;;
      esac
      printf 'XDG_DATA_DIRS=%s\n' "${base}"
  become: true
  when: ansible_facts['os_family'] == "RedHat"

# snap exposes the launcher at /snap/bin/ghostty (added to PATH via
# /etc/profile.d/snapd.sh). Put a stable launcher at ghostty_bin so `ghostty`
# works from any shell immediately, without depending on /snap/bin being on the
# current session's PATH. Normally a thin symlink; on hosts that need software
# OpenGL it is a wrapper instead (see the next task), so only create the symlink
# when software GL is not being forced.
- name: Symlink the Ghostty launcher onto PATH
  ansible.builtin.file:
    src: /snap/bin/ghostty
    dest: "{{ ghostty_bin }}"
    state: link
    force: true
  become: true
  when: not (ghostty_force_software_opengl | bool)

# On VMs whose virtual GPU lacks OpenGL 4.3, make the launcher a wrapper that
# exports LIBGL_ALWAYS_SOFTWARE=1 (selecting Mesa's llvmpipe, which exposes GL
# 4.5) before exec'ing the snap. This scopes the workaround to Ghostty alone,
# rather than forcing software GL on every app via /etc/environment. `copy` does
# not follow symlinks for the destination, so this safely replaces any existing
# /snap/bin/ghostty symlink with the wrapper (and vice versa on revert).
- name: Install a Ghostty launcher that forces software OpenGL (llvmpipe)
  ansible.builtin.copy:
    dest: "{{ ghostty_bin }}"
    mode: "0755"
    content: |
      #!/bin/sh
      # Managed by the workenv ghostty role.
      # Force Mesa's llvmpipe software rasterizer (OpenGL 4.5) so Ghostty starts
      # on VMs whose virtual GPU lacks the OpenGL 4.3 Ghostty requires.
      export LIBGL_ALWAYS_SOFTWARE=1
      exec /snap/bin/ghostty "$@"
  become: true
  when: ghostty_force_software_opengl | bool

# Make Ghostty appear in the app grid reliably on every Linux desktop. GNOME
# Shell scans the applications/ dir of each XDG_DATA_DIRS entry, but snapd puts
# Ghostty's .desktop under /var/lib/snapd/desktop, which is not on the default
# XDG_DATA_DIRS (the user-environment generator above tries to add it, but only
# takes effect after a full re-login and only on RHEL). Instead, copy the entry
# into /usr/share/applications, which is always on XDG_DATA_DIRS and is
# live-monitored by gnome-shell, so Ghostty shows up immediately and without a
# re-login on every distro. Because /usr/share/applications sorts ahead of
# snapd's dir, this same-ID entry also shadows the snap's, so its rerouted Exec
# wins. The entry is copied verbatim from the snap's own (icon, name and field
# codes preserved) with only the Exec repointed at ghostty_bin — which is either
# the plain symlink to /snap/bin/ghostty or, on VMs, the software-GL wrapper, so
# the reroute is correct in both cases.
- name: Stat the snap's Ghostty desktop entry
  ansible.builtin.stat:
    path: "{{ ghostty_snap_desktop_file }}"
  register: ghostty_snap_desktop

- name: Read the snap's Ghostty desktop entry
  ansible.builtin.slurp:
    src: "{{ ghostty_snap_desktop_file }}"
  register: ghostty_snap_desktop_content
  when: ghostty_snap_desktop.stat.exists | default(false)

- name: Install a Ghostty desktop entry that launches via ghostty_bin
  ansible.builtin.copy:
    dest: "/usr/share/applications/{{ ghostty_snap_desktop_file | basename }}"
    mode: "0644"
    content: >-
      {{ (ghostty_snap_desktop_content.content | b64decode)
         | regex_replace('/snap/bin/ghostty', ghostty_bin) }}
  become: true
  when: ghostty_snap_desktop.stat.exists | default(false)
