---
# Install Ghostty on Linux from the Snap Store (Debian/Ubuntu and RHEL family).
# The ghostty snap (published by Canonical) uses classic confinement and bundles
# its own GTK4/libadwaita, so it runs cleanly even where the system GTK is too
# old to build Ghostty from source (e.g. RHEL). snapd also registers the desktop
# entry and icons itself, so no manual desktop integration is required.
# (Ghostty is not published on Flathub, so flatpak is not used here.)

- name: Fail on unsupported Linux distribution
  ansible.builtin.fail:
    msg: >-
      Unsupported OS family '{{ ansible_facts['os_family'] }}'. The ghostty role
      installs the snap only on Debian/Ubuntu and RHEL-family systems.
  when: ansible_facts['os_family'] not in ["Debian", "RedHat"]

# --- snapd bootstrap (Debian/Ubuntu) -----------------------------------------
- name: Install snapd (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ ghostty_snapd_package }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

# --- snapd bootstrap (RHEL family) -------------------------------------------
# snapd lives in EPEL on the RHEL family, so enable EPEL first. Classic snaps
# also require /snap to exist; on RHEL snapd stores snaps under
# /var/lib/snapd/snap, so the /snap symlink has to be created by hand (without
# it, `snap install --classic` refuses to run).
- name: Enable EPEL (RHEL family)
  ansible.builtin.dnf:
    name: "{{ ghostty_epel_package }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == "RedHat"
    - ansible_facts['distribution'] != "Fedora"

- name: Install snapd (RHEL family)
  ansible.builtin.dnf:
    name: "{{ ghostty_snapd_package }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

- name: Create the /snap symlink required by classic snaps (RHEL family)
  ansible.builtin.file:
    src: /var/lib/snapd/snap
    dest: /snap
    state: link
  become: true
  when: ansible_facts['os_family'] == "RedHat"

# --- Enable snapd and wait for seeding (all families) -------------------------
- name: Enable and start the snapd socket
  ansible.builtin.systemd:
    name: snapd.socket
    state: started
    enabled: true
  become: true

# A freshly installed snapd must finish seeding before it accepts installs.
# `snap wait system seed.loaded` blocks until seeding completes and returns
# immediately once seeded, so it is safe (and idempotent) to run every time.
- name: Wait for snapd to finish seeding
  ansible.builtin.command:
    cmd: snap wait system seed.loaded
  become: true
  changed_when: false

# --- OpenGL (Mesa) drivers ----------------------------------------------------
# Ghostty renders with OpenGL and needs an OpenGL 4.3 context. Install libGL and
# the Mesa DRI drivers; these also provide the llvmpipe software rasterizer used
# as the GL 4.3 fallback on VMs (see the LIBGL_ALWAYS_SOFTWARE task below).
- name: Install OpenGL (Mesa) drivers required by Ghostty (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ ghostty_opengl_packages['Debian'] }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install OpenGL (Mesa) drivers required by Ghostty (RHEL family)
  ansible.builtin.dnf:
    name: "{{ ghostty_opengl_packages['RedHat'] }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

# --- Install Ghostty ----------------------------------------------------------
- name: Install the Ghostty snap (classic confinement)
  community.general.snap:
    name: "{{ ghostty_snap_name }}"
    classic: true
    state: present
  become: true

# snap exposes the launcher at /snap/bin/ghostty (added to PATH via
# /etc/profile.d/snapd.sh). Put a stable launcher at ghostty_bin so `ghostty`
# works from any shell immediately, without depending on /snap/bin being on the
# current session's PATH. Normally a thin symlink; on hosts that need software
# OpenGL it is a wrapper instead (see the next task), so only create the symlink
# when software GL is not being forced.
- name: Symlink the Ghostty launcher onto PATH
  ansible.builtin.file:
    src: /snap/bin/ghostty
    dest: "{{ ghostty_bin }}"
    state: link
    force: true
  become: true
  when: not (ghostty_force_software_opengl | bool)

# On VMs whose virtual GPU lacks OpenGL 4.3, make the launcher a wrapper that
# exports LIBGL_ALWAYS_SOFTWARE=1 (selecting Mesa's llvmpipe, which exposes GL
# 4.5) before exec'ing the snap. This scopes the workaround to Ghostty alone,
# rather than forcing software GL on every app via /etc/environment. `copy` does
# not follow symlinks for the destination, so this safely replaces any existing
# /snap/bin/ghostty symlink with the wrapper (and vice versa on revert).
- name: Install a Ghostty launcher that forces software OpenGL (llvmpipe)
  ansible.builtin.copy:
    dest: "{{ ghostty_bin }}"
    mode: "0755"
    content: |
      #!/bin/sh
      # Managed by the workenv ghostty role.
      # Force Mesa's llvmpipe software rasterizer (OpenGL 4.5) so Ghostty starts
      # on VMs whose virtual GPU lacks the OpenGL 4.3 Ghostty requires.
      export LIBGL_ALWAYS_SOFTWARE=1
      exec /snap/bin/ghostty "$@"
  become: true
  when: ghostty_force_software_opengl | bool

# The GNOME app-grid icon launches Ghostty via the snap's own desktop entry,
# which calls /snap/bin/ghostty directly and so bypasses the wrapper above. Shadow
# it with an override of the same desktop-file ID in /usr/share/applications
# (earlier in XDG_DATA_DIRS than snapd's dir, so it wins) whose Exec is rerouted
# through ghostty_bin. The override is copied from the snap's own entry so the
# icon, name and field codes are preserved verbatim.
- name: Stat the snap's Ghostty desktop entry
  ansible.builtin.stat:
    path: "{{ ghostty_snap_desktop_file }}"
  register: ghostty_snap_desktop
  when: ghostty_force_software_opengl | bool

- name: Read the snap's Ghostty desktop entry
  ansible.builtin.slurp:
    src: "{{ ghostty_snap_desktop_file }}"
  register: ghostty_snap_desktop_content
  when:
    - ghostty_force_software_opengl | bool
    - ghostty_snap_desktop.stat.exists | default(false)

- name: Override the Ghostty desktop entry to launch via the wrapper
  ansible.builtin.copy:
    dest: "/usr/share/applications/{{ ghostty_snap_desktop_file | basename }}"
    mode: "0644"
    content: >-
      {{ (ghostty_snap_desktop_content.content | b64decode)
         | regex_replace('/snap/bin/ghostty', ghostty_bin) }}
  become: true
  when:
    - ghostty_force_software_opengl | bool
    - ghostty_snap_desktop.stat.exists | default(false)
