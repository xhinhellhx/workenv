---
# Build and install Ghostty from source on Linux.
# Supports Debian/Ubuntu and the RHEL family (RHEL/Rocky/Alma/Fedora).

- name: Install build dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ ghostty_build_deps_debian }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Enable EPEL repository (RHEL family, excluding Fedora)
  ansible.builtin.dnf:
    name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  become: true
  when:
    - ansible_facts['os_family'] == "RedHat"
    - ansible_facts['distribution'] != "Fedora"

- name: Install build dependencies (RHEL family)
  ansible.builtin.dnf:
    name: "{{ ghostty_build_deps_redhat }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

- name: Fail on unsupported Linux distribution
  ansible.builtin.fail:
    msg: >-
      Unsupported OS family '{{ ansible_facts['os_family'] }}'. The ghostty role builds
      from source only on Debian/Ubuntu and RHEL-family systems.
  when: ansible_facts['os_family'] not in ["Debian", "RedHat"]

# --- Zig toolchain ------------------------------------------------------------
- name: Check installed Zig version
  ansible.builtin.command: "{{ ghostty_zig_dir }}/zig version"
  register: zig_installed
  changed_when: false
  failed_when: false

- name: Ensure Zig install directory exists
  ansible.builtin.file:
    path: "{{ ghostty_zig_dir }}"
    state: directory
    mode: "0755"
  become: true
  when: zig_installed.stdout != ghostty_zig_version

- name: Download and extract Zig {{ ghostty_zig_version }}
  ansible.builtin.unarchive:
    src: "{{ ghostty_zig_url }}"
    dest: "{{ ghostty_zig_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=1"
  become: true
  when: zig_installed.stdout != ghostty_zig_version

- name: Symlink zig into PATH
  ansible.builtin.file:
    src: "{{ ghostty_zig_dir }}/zig"
    dest: "/usr/local/bin/zig"
    state: link
  become: true

# --- Ghostty build ------------------------------------------------------------
- name: Check currently installed Ghostty version
  ansible.builtin.command: "{{ ghostty_install_prefix }}/bin/ghostty --version"
  register: ghostty_installed
  changed_when: false
  failed_when: false

- name: Clone Ghostty source at {{ ghostty_version }}
  ansible.builtin.git:
    repo: https://github.com/ghostty-org/ghostty.git
    dest: "{{ ghostty_build_dir }}"
    version: "{{ ghostty_version }}"
    depth: 1
    force: true
  become: true
  register: ghostty_source

- name: Determine whether a (re)build is required
  ansible.builtin.set_fact:
    ghostty_build_required: >-
      {{ ghostty_source.changed
         or ghostty_installed.rc != 0
         or (ghostty_version | regex_replace('^v', '')) not in ghostty_installed.stdout }}

- name: Build and install Ghostty ({{ ghostty_optimize }})
  ansible.builtin.command:
    cmd: >-
      {{ ghostty_zig_dir }}/zig build
      -Doptimize={{ ghostty_optimize }}
      -p {{ ghostty_install_prefix }}
    chdir: "{{ ghostty_build_dir }}"
  become: true
  when: ghostty_build_required
  changed_when: true

# --- Ensure the installed binary is runnable ----------------------------------
# On RHEL a freshly placed binary can carry the wrong SELinux file context,
# making exec fail with "Permission denied" — which looks like a non-executable
# binary. Fix the mode and restore the default context.
- name: Stat the installed Ghostty binary
  ansible.builtin.stat:
    path: "{{ ghostty_install_prefix }}/bin/ghostty"
  register: ghostty_binary

- name: Ensure the Ghostty binary is executable
  ansible.builtin.file:
    path: "{{ ghostty_install_prefix }}/bin/ghostty"
    mode: "0755"
  become: true
  when: ghostty_binary.stat.exists

- name: Restore the SELinux context on the Ghostty binary (RHEL family)
  ansible.builtin.command:
    cmd: "restorecon -v {{ ghostty_install_prefix }}/bin/ghostty"
  become: true
  register: ghostty_restorecon
  changed_when: ghostty_restorecon.stdout | length > 0
  failed_when: false
  when:
    - ghostty_binary.stat.exists
    - ansible_facts['os_family'] == "RedHat"

# --- Desktop integration ------------------------------------------------------
# Ghostty's build is meant to drop com.mitchellh.ghostty.desktop and icons under
# {{ ghostty_install_prefix }}/share, but that doesn't happen reliably on every
# distro, and /usr/local/share is not always in the session's XDG_DATA_DIRS — so
# the launcher may never scan it. Install our own entry into /usr/share, which
# is always scanned, pointing at the real binary. This makes Ghostty reliably
# visible regardless of what the build emitted.
- name: Install a Ghostty desktop entry (always-scanned location)
  ansible.builtin.copy:
    dest: /usr/share/applications/com.mitchellh.ghostty.desktop
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=Ghostty
      GenericName=Terminal
      Comment=Fast, native, feature-rich terminal emulator
      Exec={{ ghostty_install_prefix }}/bin/ghostty
      Icon=com.mitchellh.ghostty
      Terminal=false
      Categories=System;TerminalEmulator;
      Keywords=terminal;tty;pty;
      StartupNotify=true
      StartupWMClass=com.mitchellh.ghostty
      Actions=new-window

      [Desktop Action new-window]
      Name=New Window
      Exec={{ ghostty_install_prefix }}/bin/ghostty
  become: true

# Mirror any icons the build installed under the prefix into /usr/share/icons so
# they resolve even when /usr/local/share is outside XDG_DATA_DIRS. Best effort:
# does nothing if the build produced no icons.
- name: Find Ghostty icons installed by the build
  ansible.builtin.find:
    paths: "{{ ghostty_install_prefix }}/share/icons/hicolor"
    patterns: "com.mitchellh.ghostty.*"
    recurse: true
  register: ghostty_icons

- name: Mirror Ghostty icons into /usr/share/icons/hicolor
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ item.path | replace(ghostty_install_prefix ~ '/share/icons', '/usr/share/icons') }}"
    remote_src: true
    mode: "0644"
  become: true
  loop: "{{ ghostty_icons.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

# Reset the desktop entry and mirrored icons to their policy-default SELinux
# contexts (RHEL family). Data files read by the launcher, so usually correct
# already — cheap insurance against an unexpected label from the copy.
- name: Restore SELinux contexts on the desktop entry and icons (RHEL family)
  ansible.builtin.command:
    cmd: "restorecon -Rv /usr/share/applications/com.mitchellh.ghostty.desktop /usr/share/icons/hicolor"
  become: true
  register: ghostty_desktop_restorecon
  changed_when: ghostty_desktop_restorecon.stdout | length > 0
  failed_when: false
  when: ansible_facts['os_family'] == "RedHat"

- name: Refresh the desktop application database
  ansible.builtin.command:
    cmd: "update-desktop-database /usr/share/applications"
  become: true
  changed_when: true

- name: Refresh the hicolor icon cache
  ansible.builtin.command:
    cmd: "gtk-update-icon-cache --force --ignore-theme-index /usr/share/icons/hicolor"
  become: true
  changed_when: true
