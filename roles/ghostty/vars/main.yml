---
# Internal role variables (not intended to be overridden).

# Build dependencies for compiling Ghostty from source.
# https://ghostty.org/docs/install/build

ghostty_build_deps_debian:
  - build-essential
  - git
  - pkg-config
  - libgtk-4-dev
  - libadwaita-1-dev
  - blueprint-compiler
  - gettext
  - libxml2-utils
  # Provides update-desktop-database / gtk-update-icon-cache so the freshly
  # installed .desktop file and icons show up in the application launcher.
  - desktop-file-utils
  - libgtk-4-bin

ghostty_build_deps_redhat:
  - gcc
  - git
  - pkgconf-pkg-config
  - gtk4-devel
  - libadwaita-devel
  - blueprint-compiler
  - gettext
  - libxml2
  # Provides update-desktop-database / gtk-update-icon-cache so the freshly
  # installed .desktop file and icons show up in the application launcher.
  - desktop-file-utils
  - gtk4
