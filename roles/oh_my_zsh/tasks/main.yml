---
# Install Oh My Zsh via the official installer (unattended).
# --unattended disables the installer's own chsh and auto-launch; the zsh role
# owns the default shell. Per-user install to ~/.oh-my-zsh.

- name: Install prerequisites (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - git
      - curl
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_os_family == "Debian"

- name: Install prerequisites (RHEL family)
  ansible.builtin.dnf:
    name:
      - git
      - curl
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Check whether Oh My Zsh is installed
  ansible.builtin.stat:
    path: "{{ oh_my_zsh_dir }}"
  register: oh_my_zsh_existing

- name: Ensure cache directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.cache"
    state: directory
    mode: "0755"
  when: not oh_my_zsh_existing.stat.exists

- name: Download Oh My Zsh install script
  ansible.builtin.get_url:
    url: "{{ oh_my_zsh_install_url }}"
    dest: "{{ ansible_env.HOME }}/.cache/ohmyzsh-install.sh"
    mode: "0755"
    force: true
  when: not oh_my_zsh_existing.stat.exists

- name: Run Oh My Zsh install script (unattended)
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.cache/ohmyzsh-install.sh --unattended"
  environment:
    KEEP_ZSHRC: "{{ 'yes' if oh_my_zsh_keep_zshrc else 'no' }}"
  when: not oh_my_zsh_existing.stat.exists
  changed_when: true

- name: Remove Oh My Zsh install script
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.cache/ohmyzsh-install.sh"
    state: absent
