---
# Internal role variables (not intended to be overridden).

# Build dependencies for compiling Neovim from source.
# https://github.com/neovim/neovim/blob/master/BUILD.md
neovim_build_deps_debian:
  - build-essential
  - cmake
  - ninja-build
  - gettext
  - libtool
  - libtool-bin
  - autoconf
  - automake
  - pkg-config
  - unzip
  - curl
  - git
  - doxygen

# clangd (C/C++ LSP). Mason has no prebuilt clangd for Linux arm64 (the
# clangd/clangd releases ship only darwin/linux-x86_64/windows), so on Linux it
# is installed from the distro and kept out of Mason's ensure_installed; the
# neovim config resolves `clangd` from PATH. On Fedora/RHEL clangd ships in
# clang-tools-extra; Debian/Ubuntu provide a `clangd` metapackage.
neovim_clangd_package:
  Debian: clangd
  RedHat: clang-tools-extra

neovim_build_deps_redhat:
  - gcc
  - gcc-c++
  - make
  - cmake
  - ninja-build
  - gettext
  - libtool
  - autoconf
  - automake
  - pkgconfig
  - patch
  - unzip
  - curl
  - git
  - glibc-gconv-extra
