---
# Default variables for the neovim role (override in group_vars/host_vars).

# Where the Neovim config is deployed.
neovim_config_dir: "{{ xdg_config_home | default(ansible_facts['env'].HOME ~ '/.config') }}/nvim"

# Make git invoke Neovim for editing and visual diff/merge workflows.
neovim_git_editor: "nvim"
neovim_git_diff_tool: "nvimdiff"
neovim_git_settings:
  - name: "core.editor"
    value: "{{ neovim_git_editor }}"
  - name: "sequence.editor"
    value: "{{ neovim_git_editor }}"
  - name: "diff.tool"
    value: "{{ neovim_git_diff_tool }}"
  - name: "difftool.prompt"
    value: "false"
  - name: "merge.tool"
    value: "{{ neovim_git_diff_tool }}"
  - name: "mergetool.prompt"
    value: "false"

# --- Linux: build from source -------------------------------------------------
# Git tag to build (https://github.com/neovim/neovim/releases).
# renovate: datasource=github-releases depName=neovim/neovim
neovim_version: "v0.12.3"
# Where the source tree is cloned/built.
neovim_build_dir: "/usr/local/src/neovim"
# Install prefix passed to the build (binary lands in <prefix>/bin/nvim).
neovim_install_prefix: "/usr/local"
# CMake build type: RelWithDebInfo (default), Release, or Debug.
neovim_build_type: "RelWithDebInfo"

# --- macOS: Homebrew ----------------------------------------------------------
# `homebrew_prefix` is provided by the `homebrew` role dependency.
