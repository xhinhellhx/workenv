---
# Compile and install a pinned Neovim version from source on Linux.
# Supports Debian/Ubuntu and the RHEL family (RHEL/Rocky/Alma/Fedora).

- name: Install build dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ neovim_build_deps_debian }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Enable EPEL repository (RHEL family, excluding Fedora)
  ansible.builtin.dnf:
    name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  become: true
  when:
    - ansible_facts['os_family'] == "RedHat"
    - ansible_facts['distribution'] != "Fedora"

- name: Install build dependencies (RHEL family)
  ansible.builtin.dnf:
    name: "{{ neovim_build_deps_redhat }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"

- name: Fail on unsupported Linux distribution
  ansible.builtin.fail:
    msg: >-
      Unsupported OS family '{{ ansible_facts['os_family'] }}'. The neovim role builds
      from source only on Debian/Ubuntu and RHEL-family systems.
  when: ansible_facts['os_family'] not in ["Debian", "RedHat"]

- name: Check currently installed Neovim version
  ansible.builtin.command: "{{ neovim_install_prefix }}/bin/nvim --version"
  register: neovim_installed
  changed_when: false
  failed_when: false

# `nvim --version` does NOT load the runtime, so a binary whose bundled runtime
# is missing/mismatched (e.g. a stale incremental build) still reports rc 0 and
# the right version — yet fails at startup with "module 'vim.uri' not found".
# `--clean` skips user config but still loads the core runtime, so this isolates
# a broken install from plugin/config issues and lets us force a rebuild to heal.
- name: Verify the installed Neovim can load its core runtime
  ansible.builtin.command: "{{ neovim_install_prefix }}/bin/nvim --clean --headless +qa"
  register: neovim_runtime_check
  changed_when: false
  failed_when: false
  when: neovim_installed.rc == 0

- name: Clone Neovim source at {{ neovim_version }}
  ansible.builtin.git:
    repo: https://github.com/neovim/neovim.git
    dest: "{{ neovim_build_dir }}"
    version: "{{ neovim_version }}"
    depth: 1
    force: true
  become: true
  register: neovim_source

- name: Determine whether a (re)build is required
  ansible.builtin.set_fact:
    neovim_build_required: >-
      {{ neovim_source.changed
         or neovim_installed.rc != 0
         or (neovim_runtime_check.rc | default(0)) != 0
         or (neovim_version | regex_replace('^v', '')) not in neovim_installed.stdout }}

# build/ caches CMAKE_INSTALL_PREFIX and config in CMakeCache.txt; .deps holds
# the bundled luajit/tree-sitter/etc. Both are git-ignored, so `git force: true`
# updates the source on a version bump but leaves these stale — make then does a
# partial rebuild and the binary/runtime drift apart (the "module 'vim.uri' not
# found" failure). Neovim's BUILD.md calls for `make distclean` when rebuilding;
# removing the dirs is equivalent and works even on a partial/corrupt tree.
- name: Remove stale build artifacts before (re)building
  ansible.builtin.file:
    path: "{{ neovim_build_dir }}/{{ item }}"
    state: absent
  loop:
    - build
    - .deps
  become: true
  when: neovim_build_required

- name: Build Neovim ({{ neovim_build_type }})
  ansible.builtin.command:
    cmd: >-
      make
      CMAKE_BUILD_TYPE={{ neovim_build_type }}
      CMAKE_INSTALL_PREFIX={{ neovim_install_prefix }}
    chdir: "{{ neovim_build_dir }}"
  become: true
  when: neovim_build_required
  changed_when: true

- name: Install Neovim
  ansible.builtin.command:
    cmd: make install
    chdir: "{{ neovim_build_dir }}"
  become: true
  when: neovim_build_required
  changed_when: true

# `make install` runs as root and CMake's install(DIRECTORY ...) creates the
# destination dirs honouring root's umask. On hosts with a hardened umask (077,
# common on Fedora/RHEL under sudo) the runtime lands as 0700 root:root, so a
# normal user cannot read it: nvim then fails to find a valid runtime, falls back
# to $VIM and dies at startup with "module 'vim.uri' not found" / "Can't open
# file .../syntax/syntax.vim". CMake gives the binary an explicit 0755, so nvim
# still launches, which masks the problem until the runtime is loaded. Normalize
# the installed tree to a+rX (read for all, traverse on dirs) so the runtime is
# world-readable regardless of the umask in effect during the build.
- name: Ensure the installed Neovim tree is world-readable
  ansible.builtin.command:
    cmd: chmod -R a+rX {{ neovim_install_prefix }}/share/nvim
  become: true
  when: neovim_build_required
  changed_when: true

# clangd (C/C++ LSP) is installed from the distro rather than Mason: the
# clangd/clangd releases Mason pulls from have no Linux arm64 build, so Mason
# aborts with "unsupported platform" on aarch64. The distro package exists for
# every arch and the neovim config resolves `clangd` from PATH (see
# neovim_clangd_package and the Mason ensure_installed list in init.lua).
- name: Install clangd (C/C++ LSP) from the system package manager (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ neovim_clangd_package['Debian'] }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install clangd (C/C++ LSP) from the system package manager (RHEL family)
  ansible.builtin.dnf:
    name: "{{ neovim_clangd_package['RedHat'] }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "RedHat"
