---
# Default variables for the golang role.

# Go release to install (release tarballs are named without a leading "v",
# e.g. go1.26.4).
# renovate: datasource=golang-version depName=go
golang_version: "1.26.4"

# Where Go is installed (the tarball extracts a "go/" directory here's parent).
golang_install_dir: "/usr/local/go"

# Download details (official go.dev binary distribution).
golang_os: "{{ 'darwin' if ansible_facts['system'] == 'Darwin' else 'linux' }}"
golang_arch: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'amd64' }}"
golang_download_url: "https://go.dev/dl/go{{ golang_version }}.{{ golang_os }}-{{ golang_arch }}.tar.gz"
