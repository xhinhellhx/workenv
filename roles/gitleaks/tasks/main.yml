---
# Install gitleaks (secrets scanner).
#   - macOS: Homebrew (gitleaks is in homebrew-core; Homebrew ensured by the
#     `homebrew` role dependency)
#   - Linux: official release tarball -> /usr/local/bin

- name: Install gitleaks (macOS, Homebrew)
  community.general.homebrew:
    name: gitleaks
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_facts['system'] == "Darwin"

- name: Install gitleaks (Linux)
  when: ansible_facts['system'] == "Linux"
  block:
    - name: Check installed gitleaks version
      ansible.builtin.command: "{{ gitleaks_install_dir }}/gitleaks version"
      register: gitleaks_installed
      changed_when: false
      failed_when: false

    - name: Download and extract the gitleaks binary, version {{ gitleaks_version }}
      ansible.builtin.unarchive:
        src: "{{ gitleaks_download_url }}"
        dest: "{{ gitleaks_install_dir }}"
        remote_src: true
        include:
          - gitleaks
        mode: "0755"
        owner: root
        group: root
      become: true
      when: gitleaks_version not in gitleaks_installed.stdout
