---
# Default variables for the gitleaks role.

# renovate: datasource=github-releases depName=gitleaks/gitleaks extractVersion=^v(?<version>.+)$
gitleaks_version: "8.30.1"
gitleaks_install_dir: "/usr/local/bin"
gitleaks_arch: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x64' }}"
gitleaks_archive: "gitleaks_{{ gitleaks_version }}_linux_{{ gitleaks_arch }}.tar.gz"
gitleaks_download_url: "https://github.com/gitleaks/gitleaks/releases/download/v{{ gitleaks_version }}/{{ gitleaks_archive }}"
