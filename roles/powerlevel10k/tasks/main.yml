---
# Install and configure Powerlevel10k. Plugin enablement lives in separate
# roles; this role only delivers its own shell fragments. Depends on zsh_config.

- name: Clone Powerlevel10k theme
  ansible.builtin.git:
    repo: "{{ p10k_theme_repo }}"
    dest: "{{ p10k_dir }}"
    version: master
    depth: 1
    update: false

# --- Generate ~/.p10k.zsh from the chosen wizard template ---------------------
- name: Generate ~/.p10k.zsh from the wizard template {{ p10k_style }}
  ansible.builtin.copy:
    src: "{{ p10k_dir }}/config/p10k-{{ p10k_style }}.zsh"
    dest: "{{ ansible_facts['env'].HOME }}/.p10k.zsh"
    remote_src: true
    force: false
    mode: "0644"

- name: Use a single-line prompt
  ansible.builtin.replace:
    path: "{{ ansible_facts['env'].HOME }}/.p10k.zsh"
    regexp: '^[ \t]*newline\b.*\n'
    replace: ''
  when: p10k_one_line

- name: Use a compact prompt (no blank line between commands)
  ansible.builtin.replace:
    path: "{{ ansible_facts['env'].HOME }}/.p10k.zsh"
    regexp: 'POWERLEVEL9K_PROMPT_ADD_NEWLINE=true'
    replace: 'POWERLEVEL9K_PROMPT_ADD_NEWLINE=false'
  when: p10k_compact

- name: Remove the clock from the prompt
  ansible.builtin.replace:
    path: "{{ ansible_facts['env'].HOME }}/.p10k.zsh"
    regexp: '^[ \t]*time\b.*\n'
    replace: ''
  when: not p10k_show_time

- name: Extend icon padding (fix glyph overlap, e.g. SauceCodePro)
  ansible.builtin.replace:
    path: "{{ ansible_facts['env'].HOME }}/.p10k.zsh"
    regexp: 'POWERLEVEL9K_ICON_PADDING=none'
    replace: 'POWERLEVEL9K_ICON_PADDING={{ p10k_icon_padding }}'
  when: p10k_icon_padding != "none"

# my_git_formatter bakes in foreground colours (green branch, yellow counts, …)
# meant for a background-less prompt. With the Solarized palette the VCS segment
# has a coloured background, so those inline colours clash (green-on-yellow,
# yellow-on-yellow). Null them out so the Git content inherits the per-state
# segment foreground; the segment background alone conveys the Git state.
- name: Let Git status inherit the segment foreground under Solarized
  ansible.builtin.replace:
    path: "{{ ansible_facts['env'].HOME }}/.p10k.zsh"
    regexp: "(local\\s+(?:meta|clean|modified|untracked|conflicted)=)'%\\d+F'.*"
    replace: '\1'''''
  when: p10k_solarized in ['dark', 'light']

# --- Shell fragments ----------------------------------------------------------
- name: Deliver the Powerlevel10k instant prompt (early.d)
  ansible.builtin.copy:
    dest: "{{ zsh_fragment_dir }}/early.d/00-p10k-instant-prompt.zsh"
    mode: "0644"
    content: |
      # Powerlevel10k instant prompt. Must stay near the top of the config.
      if [[ -r "${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-${(%):-%n}.zsh" ]]; then
        source "${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-${(%):-%n}.zsh"
      fi

- name: Select the Powerlevel10k theme (plugins.d)
  ansible.builtin.copy:
    dest: "{{ zsh_fragment_dir }}/plugins.d/10-powerlevel10k-theme.zsh"
    mode: "0644"
    content: |
      ZSH_THEME="powerlevel10k/powerlevel10k"

- name: Source the Powerlevel10k config after oh-my-zsh (rc.d)
  ansible.builtin.copy:
    dest: "{{ zsh_fragment_dir }}/rc.d/90-powerlevel10k.zsh"
    mode: "0644"
    content: |
      [[ -f ~/.p10k.zsh ]] && source ~/.p10k.zsh

# --- Fewer icons --------------------------------------------------------------
# Layered over ~/.p10k.zsh (sourced at 92-, after the 90- that sources it).
- name: Trim decorative prompt icons (rc.d)
  ansible.builtin.copy:
    dest: "{{ zsh_fragment_dir }}/rc.d/92-powerlevel10k-fewer-icons.zsh"
    mode: "0644"
    content: |
      # Fewer prompt icons (managed by Ansible). Keeps the Git branch glyph; drops
      # the directory folder icon and the status check/cross icons.

      # Directory: drop the folder/home icon.
      typeset -g POWERLEVEL9K_DIR_VISUAL_IDENTIFIER_EXPANSION=

      # Success: no icon — the prompt char already turns green on success.
      typeset -g POWERLEVEL9K_STATUS_OK=false
      typeset -g POWERLEVEL9K_STATUS_OK_PIPE=false

      # Errors: keep the exit code, drop the ✘ glyph.
      typeset -g POWERLEVEL9K_STATUS_ERROR_VISUAL_IDENTIFIER_EXPANSION=
      typeset -g POWERLEVEL9K_STATUS_ERROR_SIGNAL_VISUAL_IDENTIFIER_EXPANSION=
      typeset -g POWERLEVEL9K_STATUS_ERROR_PIPE_VISUAL_IDENTIFIER_EXPANSION=
  when: p10k_few_icons

- name: Remove the fewer-icons fragment when disabled
  ansible.builtin.file:
    path: "{{ zsh_fragment_dir }}/rc.d/92-powerlevel10k-fewer-icons.zsh"
    state: absent
  when: not p10k_few_icons

# --- Solarized palette --------------------------------------------------------
# Layered over the generated ~/.p10k.zsh. Sourced at 91-… (after the 90-… that
# sources ~/.p10k.zsh); p10k reads POWERLEVEL9K_* parameters lazily at prompt
# build, so these re-assignments override the wizard template's colours.
- name: "Apply the Solarized palette: (rc.d) {{ p10k_solarized }}"
  vars:
    p: "{{ p10k_solarized_palettes[p10k_solarized] }}"
  ansible.builtin.copy:
    dest: "{{ zsh_fragment_dir }}/rc.d/91-powerlevel10k-solarized.zsh"
    mode: "0644"
    content: |
      # Solarized {{ p10k_solarized }} palette for Powerlevel10k (managed by Ansible).
      # Overrides the per-segment colours in ~/.p10k.zsh; xterm-256 indices.

      # Directory / OS icon.
      typeset -g POWERLEVEL9K_OS_ICON_FOREGROUND={{ p.bright }}
      typeset -g POWERLEVEL9K_OS_ICON_BACKGROUND={{ p10k_solarized_blue }}
      typeset -g POWERLEVEL9K_DIR_FOREGROUND={{ p.bright }}
      typeset -g POWERLEVEL9K_DIR_BACKGROUND={{ p10k_solarized_blue }}
      typeset -g POWERLEVEL9K_DIR_ANCHOR_FOREGROUND={{ p.bright }}
      typeset -g POWERLEVEL9K_DIR_SHORTENED_FOREGROUND={{ p.emphasized }}

      # Git / version control.
      typeset -g POWERLEVEL9K_VCS_CLEAN_BACKGROUND={{ p10k_solarized_green }}
      typeset -g POWERLEVEL9K_VCS_CLEAN_FOREGROUND={{ p.base_bg }}
      typeset -g POWERLEVEL9K_VCS_MODIFIED_BACKGROUND={{ p10k_solarized_yellow }}
      typeset -g POWERLEVEL9K_VCS_MODIFIED_FOREGROUND={{ p.base_bg }}
      typeset -g POWERLEVEL9K_VCS_UNTRACKED_BACKGROUND={{ p10k_solarized_green }}
      typeset -g POWERLEVEL9K_VCS_UNTRACKED_FOREGROUND={{ p.base_bg }}
      typeset -g POWERLEVEL9K_VCS_CONFLICTED_BACKGROUND={{ p10k_solarized_red }}
      typeset -g POWERLEVEL9K_VCS_CONFLICTED_FOREGROUND={{ p.bright }}
      typeset -g POWERLEVEL9K_VCS_LOADING_BACKGROUND={{ p.base_bg_alt }}
      typeset -g POWERLEVEL9K_VCS_LOADING_FOREGROUND={{ p.emphasized }}
      # Git icon follows the per-state foreground (overrides the wizard's green icon).
      typeset -g POWERLEVEL9K_VCS_CLEAN_VISUAL_IDENTIFIER_COLOR={{ p.base_bg }}
      typeset -g POWERLEVEL9K_VCS_MODIFIED_VISUAL_IDENTIFIER_COLOR={{ p.base_bg }}
      typeset -g POWERLEVEL9K_VCS_UNTRACKED_VISUAL_IDENTIFIER_COLOR={{ p.base_bg }}
      typeset -g POWERLEVEL9K_VCS_CONFLICTED_VISUAL_IDENTIFIER_COLOR={{ p.bright }}
      typeset -g POWERLEVEL9K_VCS_LOADING_VISUAL_IDENTIFIER_COLOR={{ p.emphasized }}

      # Prompt symbol.
      typeset -g POWERLEVEL9K_PROMPT_CHAR_OK_{VIINS,VICMD,VIVIS,VIOWR}_FOREGROUND={{ p10k_solarized_green }}
      typeset -g POWERLEVEL9K_PROMPT_CHAR_ERROR_{VIINS,VICMD,VIVIS,VIOWR}_FOREGROUND={{ p10k_solarized_red }}

      # Exit status.
      typeset -g POWERLEVEL9K_STATUS_OK_FOREGROUND={{ p10k_solarized_green }}
      typeset -g POWERLEVEL9K_STATUS_ERROR_BACKGROUND={{ p10k_solarized_red }}
      typeset -g POWERLEVEL9K_STATUS_ERROR_FOREGROUND={{ p.bright }}

      # Command execution time.
      typeset -g POWERLEVEL9K_COMMAND_EXECUTION_TIME_BACKGROUND={{ p.base_bg_alt }}
      typeset -g POWERLEVEL9K_COMMAND_EXECUTION_TIME_FOREGROUND={{ p.bright }}

      # Background jobs.
      typeset -g POWERLEVEL9K_BACKGROUND_JOBS_BACKGROUND={{ p10k_solarized_cyan }}
      typeset -g POWERLEVEL9K_BACKGROUND_JOBS_FOREGROUND={{ p.base_bg }}

      # Clock.
      typeset -g POWERLEVEL9K_TIME_BACKGROUND={{ p.base_bg }}
      typeset -g POWERLEVEL9K_TIME_FOREGROUND={{ p.emphasized }}
  when: p10k_solarized in ['dark', 'light']

- name: Remove the Solarized palette fragment when disabled
  ansible.builtin.file:
    path: "{{ zsh_fragment_dir }}/rc.d/91-powerlevel10k-solarized.zsh"
    state: absent
  when: p10k_solarized not in ['dark', 'light']

# --- Cursor shape -------------------------------------------------------------
# A DECSCUSR escape, not a POWERLEVEL9K_* setting: re-applied via a precmd hook
# so the shape survives commands that change the cursor (vim, etc.). Works in any
# terminal that honours DECSCUSR, independent of the ghostty role's cursor config.
- name: "Force the shell cursor shape (rc.d): {{ p10k_cursor_style }}"
  vars:
    cursor_code: "{{ p10k_cursor_style_codes[p10k_cursor_style] }}"
  ansible.builtin.copy:
    dest: "{{ zsh_fragment_dir }}/rc.d/93-cursor-style.zsh"
    mode: "0644"
    content: |
      # Shell cursor shape (managed by Ansible): {{ p10k_cursor_style }}.
      # Emits a DECSCUSR escape before each prompt so the shape persists after
      # commands that leave the cursor in a different state.
      _zsh_set_cursor_style() { print -n '\e[{{ cursor_code }} q' }
      autoload -Uz add-zsh-hook
      add-zsh-hook precmd _zsh_set_cursor_style
  when: p10k_cursor_style != "off"

- name: Remove the cursor-shape fragment when disabled
  ansible.builtin.file:
    path: "{{ zsh_fragment_dir }}/rc.d/93-cursor-style.zsh"
    state: absent
  when: p10k_cursor_style == "off"
