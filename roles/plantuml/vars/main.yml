---
# Internal role variables (not intended to be overridden).
# PlantUML runs on the JVM and shells out to Graphviz (dot).

plantuml_deps_debian:
  - default-jre-headless
  - graphviz

plantuml_deps_redhat:
  # Virtual provide for the distro's default headless OpenJDK (mirrors
  # Debian's default-jre-headless). Version-pinned names like
  # java-17-openjdk-headless aren't available on every release — e.g. RHEL 10
  # ships Java 21 and dropped the 17 packages.
  - java-headless
  - graphviz
