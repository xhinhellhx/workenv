---
# Install pre-commit.
#   - macOS: Homebrew (Homebrew ensured by the `homebrew` role dependency)
#   - Linux: pipx (isolated, latest version) on Debian/Ubuntu and RHEL family

- name: Install pre-commit (macOS, Homebrew)
  community.general.homebrew:
    name: pre-commit
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_facts['system'] == "Darwin"

- name: Install pre-commit (Linux)
  when: ansible_facts['system'] == "Linux"
  block:
    - name: Install pipx (Debian/Ubuntu)
      ansible.builtin.apt:
        name: pipx
        state: present
        update_cache: true
        cache_valid_time: 3600
      become: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Enable EPEL repository (RHEL family, excluding Fedora)
      ansible.builtin.dnf:
        name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
        state: present
        disable_gpg_check: true
      become: true
      when:
        - ansible_facts['os_family'] == "RedHat"
        - ansible_facts['distribution'] != "Fedora"

    - name: Install pipx (RHEL family)
      ansible.builtin.dnf:
        name: pipx
        state: present
      become: true
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install pre-commit with pipx
      community.general.pipx:
        name: pre-commit
        state: present
        executable: /usr/bin/pipx

# Auto-install hooks on `git clone` / `git init` via a global git template.
- name: Ensure the git template directory exists
  ansible.builtin.file:
    path: "{{ git_template_dir }}"
    state: directory
    mode: "0755"

- name: Point git's init.templateDir at the template
  community.general.git_config:
    name: init.templateDir
    value: "{{ git_template_dir }}"
    scope: global

- name: Install the pre-commit hook into the git template
  ansible.builtin.command: "{{ pre_commit_bin }} init-templatedir {{ git_template_dir }}"
  args:
    creates: "{{ git_template_dir }}/hooks/pre-commit"
