---
# Default variables for the nvm role.

nvm_dir: "{{ ansible_facts['env'].HOME }}/.nvm"
nvm_repo: "https://github.com/nvm-sh/nvm.git"
# Git ref to install. Empty = check out the latest release tag.
nvm_version: ""
# nvm init is delivered as a zsh fragment at
# {{ zsh_fragment_dir }}/rc.d/30-nvm.zsh (see the zsh_config role).
