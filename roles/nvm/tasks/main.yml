---
# Install nvm (Node Version Manager) via git clone, then wire up the shell.
# Uniform across macOS and Linux; git is required to clone.

- name: Install git (Debian/Ubuntu)
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_os_family == "Debian"

- name: Install git (RHEL family)
  ansible.builtin.dnf:
    name: git
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Check whether nvm is installed
  ansible.builtin.stat:
    path: "{{ nvm_dir }}/nvm.sh"
  register: nvm_installed

- name: Install nvm
  when: not nvm_installed.stat.exists
  block:
    - name: Clone nvm
      ansible.builtin.git:
        repo: "{{ nvm_repo }}"
        dest: "{{ nvm_dir }}"
        version: "{{ nvm_version | default(omit, true) }}"

    - name: Determine the latest nvm release tag
      ansible.builtin.command: "git -C {{ nvm_dir }} describe --abbrev=0 --tags"
      register: nvm_latest_tag
      changed_when: false
      when: nvm_version | length == 0

    - name: Check out the latest nvm release
      ansible.builtin.command: "git -C {{ nvm_dir }} checkout {{ nvm_latest_tag.stdout }}"
      changed_when: true
      when: nvm_version | length == 0

- name: Ensure the zsh rc.d directory exists
  ansible.builtin.file:
    path: "{{ zsh_fragment_dir }}/rc.d"
    state: directory
    mode: "0755"

- name: Configure nvm in the shell (rc.d fragment)
  ansible.builtin.copy:
    dest: "{{ zsh_fragment_dir }}/rc.d/30-nvm.zsh"
    mode: "0644"
    content: |
      export NVM_DIR="{{ nvm_dir }}"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
