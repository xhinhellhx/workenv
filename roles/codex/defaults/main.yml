---
# Default variables for the codex role.

# Codex release to install (https://github.com/openai/codex/releases).
# yamllint disable rule:line-length
# renovate: datasource=github-releases depName=openai/codex extractVersion=^rust-v(?<version>.+)$
codex_version: "0.142.5"

# Directory the codex binary is installed into.
codex_install_dir: "/usr/local/bin"

# macOS: Codex is distributed as a Homebrew cask.
codex_brew_cask: "codex"

# Download details (official release archive). Codex names its Linux assets with
# Rust target triples: aarch64/x86_64 and musl.
codex_arch: "{{ 'aarch64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x86_64' }}"
codex_linux_download_url: "https://github.com/openai/codex/releases/download/rust-v{{ codex_version }}/codex-{{ codex_arch }}-unknown-linux-musl.tar.gz"
# yamllint enable rule:line-length
