---
# Install codex (OpenAI Codex CLI).
#   - macOS: Homebrew cask (Homebrew ensured by the `homebrew` role dependency)
#   - Linux: release tarball (musl, static) -> codex_install_dir

- name: Install codex (macOS, Homebrew cask)
  community.general.homebrew_cask:
    name: "{{ codex_brew_cask }}"
    state: present
    path: "{{ homebrew_prefix }}/bin"
  when: ansible_facts['system'] == "Darwin"

- name: Check installed codex version
  ansible.builtin.command: "{{ codex_install_dir }}/codex --version"
  register: codex_installed
  changed_when: false
  failed_when: false
  when: ansible_facts['system'] == "Linux"

- name: Install codex from release archive
  when:
    - ansible_facts['system'] == "Linux"
    - codex_version not in codex_installed.stdout
  block:
    - name: Create a temporary directory for the codex download
      ansible.builtin.tempfile:
        state: directory
        suffix: codex
      register: codex_tmp

    - name: Download and extract the codex release archive (Linux)
      ansible.builtin.unarchive:
        src: "{{ codex_linux_download_url }}"
        dest: "{{ codex_tmp.path }}"
        remote_src: true

    # yamllint disable rule:line-length
    - name: Install the codex binary
      ansible.builtin.shell: |
        set -eu
        bin="$(find '{{ codex_tmp.path }}' -type f -name 'codex-*' -print -quit)"
        install -m 0755 "$bin" \
          '{{ codex_install_dir }}/codex'
      become: true
      changed_when: true
    # yamllint enable rule:line-length

    - name: Remove the temporary directory
      ansible.builtin.file:
        path: "{{ codex_tmp.path }}"
        state: absent
