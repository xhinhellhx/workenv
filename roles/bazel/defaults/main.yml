---
# Default variables for the bazel role.

# Bazel release to install on Linux (https://github.com/bazelbuild/bazel/releases).
# renovate: datasource=github-releases depName=bazelbuild/bazel
bazel_version: "9.1.1"
# Directory the bazel binary is installed into (Linux).
bazel_install_dir: "/usr/local/bin"

# Download details (Linux standalone release binary). Bazel names its assets
# with `x86_64` / `arm64`.
bazel_arch: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x86_64' }}"
bazel_download_url: "https://github.com/bazelbuild/bazel/releases/download/{{ bazel_version }}/bazel-{{ bazel_version }}-linux-{{ bazel_arch }}"
# Re-run the installer even if bazel is already present (to upgrade).
bazel_force: false
