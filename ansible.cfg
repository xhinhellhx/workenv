[defaults]
inventory = inventory/hosts.yml
roles_path = roles
become_plugins = plugins/become
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent
# Facts are referenced explicitly via ansible_facts[...]; do not also inject
# them as top-level ansible_* vars (that behavior is deprecated upstream).
inject_facts_as_vars = False

[privilege_escalation]
become = False
become_method = sudo_pam
# Roles opt in to privilege escalation per task. Always let Ansible collect the
# sudo password up front so local become handshakes do not depend on callers
# remembering to pass -K/--ask-become-pass.
become_ask_pass = True
