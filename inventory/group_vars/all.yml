---
# Variables applied to every host in the inventory.
xdg_config_home: "{{ ansible_facts['env'].HOME }}/.config"

# Base directory for the by-parts zsh configuration fragments.
# Roles drop fragments into its subdirectories; the zsh_config role's
# ~/.zshrc skeleton sources them in order:
#   early.d/   - sourced first (e.g. Powerlevel10k instant prompt)
#   plugins.d/ - sourced before oh-my-zsh (ZSH_THEME, plugins+=(...))
#   rc.d/      - sourced after oh-my-zsh (tool init, prompt config)
zsh_fragment_dir: "{{ xdg_config_home }}/zsh"
