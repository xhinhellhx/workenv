---
# Inventory of machines whose work environment is managed by this repo.
all:
  children:
    workstations:
      hosts:
        localhost:
          ansible_connection: local
          # Keep sudo's prompt on the streams Ansible watches. Without
          # pipelining, the local connection may allocate a PTY for become and
          # then miss the prompt, which surfaces as a timeout even though the
          # password entered for -K is correct.
          ansible_pipelining: true
          # Ansible's local connection waits only 10s by default for sudo's
          # become handshake. Slow or chatty sudo setups can exceed that even
          # when the password is correct.
          ansible_local_become_success_timeout: 60
